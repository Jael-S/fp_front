
<div class="main-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo-section">
      <h2 class="logo">FlowPolicy</h2>
    </div>
    
    <nav class="nav-menu">
      <a routerLink="/dashboard" [routerLinkActive]="'active'" class="nav-item">
        <span class="icon icon-dashboard"></span>
        <span class="label">Panel Principal</span>
      </a>
      <a href="#" class="nav-item">
        <span class="icon icon-projects"></span>
        <span class="label">Proyectos</span>
      </a>
      <a href="#" class="nav-item">
        <span class="icon icon-workflow"></span>
        <span class="label">Flujos de Trabajo</span>
      </a>
      <a routerLink="/usuarios" [routerLinkActive]="'active'" class="nav-item">
        <span class="icon icon-users"></span>
        <span class="label">Usuarios</span>
      </a>
      <a routerLink="/departamentos" [routerLinkActive]="'active'" class="nav-item">
        <span class="icon icon-departments"></span>
        <span class="label">Departamentos</span>
      </a>
      <a href="#" class="nav-item">
        <span class="icon icon-analytics"></span>
        <span class="label">Informes</span>
      </a>
      <a href="#" class="nav-item">
        <span class="icon icon-compliance"></span>
        <span class="label">Cumplimiento</span>
      </a>
    </nav>

    <div class="nav-footer">
      <a href="#" class="nav-item">
        <span class="icon icon-support"></span>
        <span class="label">Soporte</span>
      </a>
      <a href="#" class="nav-item">
        <span class="icon icon-logout"></span>
        <span class="label">Cerrar Sesión</span>
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Top Bar -->
    <header class="top-bar">
      <div class="header-left">
        <span class="breadcrumb">Aplicación</span>
        <span class="breadcrumb-separator">›</span>
        <span class="breadcrumb">Inicio</span>
      </div>
      <div class="header-right">
        <input type="text" class="search-input" placeholder="Búsqueda global..." />
        <button class="icon-btn" title="Notificaciones">
          <span class="icon-bell"></span>
        </button>
        <button class="icon-btn" title="Configuración">
          <span class="icon-settings"></span>
        </button>
        <button class="icon-btn" title="Perfil">
          <span class="icon-profile"></span>
        </button>
      </div>
    </header>

    <!-- Content Area -->
    <section class="content-area">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
