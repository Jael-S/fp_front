<main class="login-page">
  <section class="auth-card">
    <h1 class="brand-title">Flow<span>Policy</span></h1>
    <p class="brand-subtitle">AUTOMATIZACION DE PROCESOS</p>

    <div class="auth-tabs">
      <a routerLink="/login" class="tab-link is-active">Iniciar Sesion</a>
      <a routerLink="/registro" class="tab-link">Crear Cuenta</a>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label for="email">CORREO ELECTRONICO</label>
      <input id="email" formControlName="email" type="email" placeholder="tu@correo.com" />

      <label for="password">CONTRASENA</label>
      <input id="password" formControlName="password" type="password" placeholder="Minimo 6 caracteres" />

      <button type="submit" class="btn-submit" [disabled]="isLoading">
        {{ isLoading ? 'Cargando...' : 'Iniciar Sesion' }}
      </button>

      <p class="error" *ngIf="form.controls.email.touched && form.controls.email.hasError('required')">Ingresa tu correo</p>
      <p class="error" *ngIf="form.controls.email.touched && form.controls.email.hasError('email')">Formato de correo invalido</p>
      <p class="error" *ngIf="form.controls.password.touched && form.controls.password.hasError('required')">Ingresa tu contrasena</p>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <div class="divider"><span>o continuar con</span></div>

      <div class="social-row">
        <button type="button" class="btn-social">
          <span>G</span>
          Google
        </button>
        <button type="button" class="btn-social">
          <span>f</span>
          Microsoft
        </button>
      </div>

      <p class="switch-auth">No tienes cuenta? <a routerLink="/registro">Registrate aqui</a></p>
    </form>
  </section>
</main>
