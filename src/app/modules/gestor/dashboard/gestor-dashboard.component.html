<section class="dashboard-grid">
  <article class="metric-card">
    <p>Usuarios</p>
    <strong>{{ totalUsuarios() }}</strong>
  </article>
  <article class="metric-card">
    <p>Departamentos</p>
    <strong>{{ totalDepartamentos() }}</strong>
  </article>
  <article class="metric-card">
    <p>Politicas</p>
    <strong>{{ totalPoliticas() }}</strong>
  </article>
  <article class="metric-card">
    <p>Total tramites</p>
    <strong>{{ totalTramites() }}</strong>
  </article>
</section>

<section class="panel-grid">
  <article class="panel chart-panel">
    <h3>Tramites por estado</h3>
    <div class="canvas-wrap">
      <canvas #tramitesChart></canvas>
    </div>
  </article>

  <article class="panel">
    <h3>Actividad reciente</h3>
    <ul>
      <li *ngFor="let item of recientes()">{{ item }}</li>
    </ul>
  </article>
</section>
