<section class="departamentos-container">
  <header class="page-header">
    <h2>Departamentos</h2>
    <button class="btn-primary" type="button" (click)="create()">
      <i class="fas fa-plus" aria-hidden="true"></i>
      Crear departamento
    </button>
  </header>

  <div class="data-table">
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Descripción</th>
          <th>Responsable</th>
          <th>Usuarios</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of rows()">
          <td class="nombre-cell">{{ r.nombre }}</td>
          <td class="descripcion-cell">{{ r.descripcion || '-' }}</td>
          <td class="responsable-cell">{{ responsableName(r.responsableId) }}</td>
          <td class="usuarios-cell">{{ r.cantidadUsuarios }}</td>
          <td>
            <span [ngClass]="'badge-' + (r.activo ? 'activo' : 'inactivo')">
              {{ r.activo ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
          <td class="actions">
            <button class="btn-link" type="button" (click)="edit(r)" title="Editar">
              <i class="fas fa-edit" aria-hidden="true"></i>
            </button>
            <button class="btn-link btn-danger" type="button" (click)="deactivate(r)" [disabled]="!r.activo" title="Desactivar">
              <i class="fas fa-times" aria-hidden="true"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
