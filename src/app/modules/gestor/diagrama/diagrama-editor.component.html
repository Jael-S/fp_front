<div class="diagrama-container">
  <div class="toolbar">
    <button type="button" (click)="guardar()" [disabled]="isSaving">💾 Guardar</button>
    <button type="button" (click)="autoLayout()">⟳ Auto organizar</button>
    <button type="button" (click)="zoomIn()">🔍+</button>
    <button type="button" (click)="zoomOut()">🔍-</button>
    <button type="button" (click)="resetZoom()">Reset</button>
    <button type="button" (click)="exportarPNG()">PNG</button>
    <button type="button" (click)="exportarPDF()">PDF</button>
    <button type="button" (click)="validar()">Validar</button>
  </div>
  <div class="canvas-container">
    <div id="bpmn-canvas"></div>
  </div>
</div>
