<aside class="paleta">
  <div class="title">Herramientas</div>

  <div class="group">
    <button class="tool" type="button" (click)="zoomIn.emit()">
      <span class="ico">🔍</span>
      <span class="txt">Zoom In</span>
    </button>
    <button class="tool" type="button" (click)="zoomOut.emit()">
      <span class="ico">🔍</span>
      <span class="txt">Zoom Out</span>
    </button>
    <button class="tool" type="button" (click)="resetView.emit()">
      <span class="ico">🔄</span>
      <span class="txt">Reset view</span>
    </button>
  </div>

  <div class="group">
    <button class="tool primary" type="button" (click)="validate.emit()">
      <span class="ico">📏</span>
      <span class="txt">Validar</span>
    </button>
    <button class="tool primary" type="button" [disabled]="isSaving" (click)="save.emit()">
      <span class="ico">💾</span>
      <span class="txt">{{ isSaving ? 'Guardando…' : 'Guardar' }}</span>
    </button>
  </div>

  <div class="group">
    <button class="tool" type="button" (click)="exportPng.emit()">
      <span class="ico">📸</span>
      <span class="txt">Exportar PNG</span>
    </button>
    <button class="tool" type="button" (click)="exportPdf.emit()">
      <span class="ico">📄</span>
      <span class="txt">Exportar PDF</span>
    </button>
  </div>

  <div class="group">
    <button class="tool" type="button" (click)="autoLayout.emit()">
      <span class="ico">🔁</span>
      <span class="txt">Auto Layout</span>
    </button>
  </div>

  <div class="issues">
    <button class="issues-title" type="button" (click)="toggleIssues()">
      <span>Validación</span>
      <span class="badge" [class.badge-ok]="issues.length === 0">{{ issues.length }}</span>
    </button>

    @if (isIssuesOpen()) {
      @if (issues.length === 0) {
        <div class="issue ok">✅ Diagrama válido (sin errores)</div>
      } @else {
        @for (it of issues; track it.message) {
          <div class="issue" [class.err]="it.level === 'ERROR'" [class.warn]="it.level === 'WARN'">
            <div class="lvl">{{ it.level === 'ERROR' ? '⛔' : '⚠️' }} {{ it.level }}</div>
            <div class="msg">{{ it.message }}</div>
          </div>
        }
      }
    }
  </div>
</aside>
