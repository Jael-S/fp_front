<div class="dialog">
  <button class="close-btn" type="button" mat-dialog-close aria-label="Cerrar">×</button>

  <h2>{{ data.politica ? 'Editar política' : 'Crear política' }}</h2>

  <form [formGroup]="form" class="form-grid">
    <label>
      Nombre <span class="required">*</span>
      <input formControlName="nombre" />
      @if (form.controls.nombre.touched && form.controls.nombre.hasError('required')) {
        <small class="error">El nombre es obligatorio.</small>
      }
    </label>

    <label>
      Descripción del proceso
      <textarea rows="4" formControlName="descripcion"
                placeholder="Describe el proceso en lenguaje natural para que la IA genere el diagrama..."></textarea>
    </label>

    <!-- Sección IA -->
    <div class="ia-section">
      <p class="ia-title"><i class="fas fa-robot"></i> Asistente IA</p>
      <div class="ia-buttons">
        <button type="button" class="btn-voz"
                [class.escuchando]="escuchando()"
                (click)="iniciarGrabacion()"
                [disabled]="escuchando()">
          <i class="fas" [class.fa-microphone]="!escuchando()" [class.fa-circle]="escuchando()"></i>
          {{ escuchando() ? 'Escuchando...' : 'Grabar descripción' }}
        </button>

        <button type="button" class="btn-ia"
                (click)="generarDiagramaConIA()"
                [disabled]="generando()">
          <i class="fas fa-magic"></i>
          {{ generando() ? 'Generando...' : 'Generar diagrama' }}
        </button>
      </div>

      @if (mensajeIA()) {
        <p class="ia-mensaje" [class.ia-ok]="tareasIA().length > 0">
          {{ mensajeIA() }}
        </p>
      }

      @if (tareasIA().length > 0) {
        <div class="tareas-detectadas">
          <p class="tareas-titulo">Tareas detectadas:</p>
          <ol>
            @for (t of tareasIA(); track t) {
              <li>{{ t }}</li>
            }
          </ol>
        </div>
      }
    </div>
  </form>

  <div class="actions">
    <button class="btn" type="button" mat-dialog-close>Cancelar</button>
    <button class="btn-primary" type="button" (click)="save()">
      {{ data.politica ? 'Guardar' : 'Crear' }}
    </button>
  </div>
</div>
