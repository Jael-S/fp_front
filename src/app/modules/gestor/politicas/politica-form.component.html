<div class="dialog">
  <button class="close-btn" type="button" mat-dialog-close aria-label="Cerrar">X</button>

  <h2>{{ data.politica ? 'Editar política' : 'Crear política' }}</h2>

  <form [formGroup]="form" class="form-grid">
    <label>
      Nombre <span class="required">*</span>
      <input formControlName="nombre" />
      <small class="error" *ngIf="form.controls.nombre.touched && form.controls.nombre.hasError('required')">
        El nombre es obligatorio.
      </small>
    </label>

    <label>
      Descripción
      <textarea rows="3" formControlName="descripcion"></textarea>
    </label>
  </form>

  <div class="actions">
    <button class="btn" type="button" mat-dialog-close>Cancelar</button>
    <button class="btn-primary" type="button" (click)="save()">
      {{ data.politica ? 'Guardar' : 'Crear' }}
    </button>
  </div>
</div>
