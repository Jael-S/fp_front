<div class="modal-container">
  <header class="modal-header">
    <h3>{{ isEdit ? 'Editar usuario' : 'Crear usuario' }}</h3>
    <button class="btn-close" type="button" mat-dialog-close>
      <i class="fas fa-times" aria-hidden="true"></i>
    </button>
  </header>

  <div class="modal-body" [formGroup]="form">
    <div class="form-grid">
      <div class="field">
        <label>Nombre *</label>
        <input type="text" class="control" formControlName="nombre" placeholder="Nombre completo" />
      </div>

      <div class="field">
        <label>Email *</label>
        <input type="email" class="control" formControlName="email" placeholder="usuario@email.com" />
      </div>

      <div class="field" *ngIf="!isEdit">
        <label>Contraseña *</label>
        <input type="password" class="control" formControlName="password" placeholder="Contraseña segura" />
      </div>

      <div class="field">
        <label>Rol *</label>
        <select class="control" formControlName="rol">
          <option value="">Seleccionar rol...</option>
          <option *ngFor="let rol of roles" [value]="rol">{{ rol }}</option>
        </select>
      </div>

      <div class="field">
        <label>Departamento</label>
        <select class="control" formControlName="departamentoId">
          <option value="">Sin departamento</option>
          <option *ngFor="let dep of departamentos" [value]="dep.id">{{ dep.nombre }}</option>
        </select>
      </div>
    </div>
  </div>

  <footer class="modal-actions">
    <button class="btn-cancel" type="button" mat-dialog-close>Cancelar</button>
    <button class="btn-save" type="button" (click)="save()">{{ isEdit ? 'Guardar' : 'Crear' }}</button>
  </footer>
</div>
