<section class="usuarios-container">
  <div class="page-header">
    <h2>Usuarios</h2>
    <button class="btn-primary" type="button" (click)="create()">
      <i class="fas fa-plus" aria-hidden="true"></i>
      Crear usuario
    </button>
  </div>

  <div class="filter-bar">
    <select class="filter-select">
      <option value="">Todos los departamentos</option>
      <option *ngFor="let dep of departamentos()" [value]="dep.id">{{ dep.nombre }}</option>
    </select>
  </div>

  <div class="data-table">
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Email</th>
          <th>Rol</th>
          <th>Departamento</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of dataSource.data">
          <td>{{ r.nombre }}</td>
          <td>{{ r.email }}</td>
          <td><span class="badge-rol" [class]="r.rol.toLowerCase()">{{ r.rol }}</span></td>
          <td>{{ depName(r.departamentoId) }}</td>
          <td><span class="badge-estado" [class]="r.activo ? 'activo' : 'inactivo'">{{ r.activo ? 'Activo' : 'Inactivo' }}</span></td>
          <td class="actions">
            <button class="btn-link" type="button" title="Editar" (click)="edit(r)">
              <i class="fas fa-edit" aria-hidden="true"></i>
            </button>
            <button class="btn-link btn-danger" type="button" [title]="r.activo ? 'Desactivar' : 'Activar'" (click)="toggle(r)">
              <i [class]="r.activo ? 'fas fa-ban' : 'fas fa-check'" aria-hidden="true"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
