<section class="card shell-card">
  <header class="header">
    <h2>Usuarios</h2>
    <button class="btn-primary" type="button" (click)="create()">Crear usuario</button>
  </header>

  <mat-form-field appearance="outline" class="filter">
    <mat-label>Filtrar por departamento</mat-label>
    <mat-select [value]="selectedDepartamento()" (selectionChange)="selectedDepartamento.set($event.value); load()">
      <mat-option value="">Todos</mat-option>
      <mat-option *ngFor="let dep of departamentos()" [value]="dep.id">{{ dep.nombre }}</mat-option>
    </mat-select>
  </mat-form-field>

  <div class="table-wrap">
    <table mat-table [dataSource]="dataSource">
    <ng-container matColumnDef="nombre"><th mat-header-cell *matHeaderCellDef>Nombre</th><td mat-cell *matCellDef="let r">{{ r.nombre }}</td></ng-container>
    <ng-container matColumnDef="email"><th mat-header-cell *matHeaderCellDef>Email</th><td mat-cell *matCellDef="let r">{{ r.email }}</td></ng-container>
    <ng-container matColumnDef="rol"><th mat-header-cell *matHeaderCellDef>Rol</th><td mat-cell *matCellDef="let r">{{ r.rol }}</td></ng-container>
    <ng-container matColumnDef="departamento"><th mat-header-cell *matHeaderCellDef>Departamento</th><td mat-cell *matCellDef="let r">{{ depName(r.departamentoId) }}</td></ng-container>
    <ng-container matColumnDef="estado"><th mat-header-cell *matHeaderCellDef>Estado</th><td mat-cell *matCellDef="let r">{{ r.activo ? 'Activo' : 'Inactivo' }}</td></ng-container>
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let r">
        <button class="btn" type="button" (click)="edit(r)">Editar</button>
        <button class="btn btn-warn" type="button" (click)="toggle(r)">{{ r.activo ? 'Desactivar' : 'Activar' }}</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>

  <mat-paginator [length]="totalItems()" [pageIndex]="page()" [pageSize]="size()" [pageSizeOptions]="[5,10,20]" (page)="onPage($event)" />
</section>
